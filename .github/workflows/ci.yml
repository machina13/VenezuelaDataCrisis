name: CI

on:
  pull_request:
    branches: [master]

# Cancela runs anteriores del mismo PR/branch para no desperdiciar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scrapers/requirements.txt ruff==0.15.20

      - name: Run tests
        run: python -m pytest scrapers/tests

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy --strict en adapters/parsers)
        run: |
          python -m mypy --strict --follow-imports=silent scrapers/adapters scrapers/parsers

      - name: Secret scan (gitleaks)
        if: always()
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block real data files
        run: |
          set -euo pipefail
          FORBIDDEN=$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | grep -iE '\.(csv|jsonl|pdf|db|sqlite|xlsx)$' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::No se pueden subir archivos de datos reales (CONTRIBUTING.MD):"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: Dependency vulnerability scan (pip-audit)
        if: always()
        run: |
          pip install pip-audit
          pip-audit -r scrapers/requirements.txt

      - name: SAST (bandit)
        if: always()
        run: |
          pip install bandit
          bandit -r scrapers/ shared/ --skip B101,B105,B107,B110,B311

      - name: Security keyword scan (PII / secrets)
        run: |
          set -euo pipefail
          # Archivos donde estas palabras son nombres de campo legitimos del
          # propio pipeline de tokenizacion de PII, no datos filtrados.
          ALLOWLIST='^(shared/hashing\.py|shared/helpers\.py|scrapers/tests/test_helpers\.py|scrapers/sanitizers/pii_tokenizer\.py|scrapers/sanitizers/pii_redactor\.py|scrapers/sanitizers/minor_protection\.py|scrapers/normalizers/person\.py|scrapers/normalizers/text\.py|scrapers/normalizers/location\.py|scrapers/models/person\.py|scrapers/validators/quality\.py|scrapers/tests/test_pii_hmac_fields\.py|scrapers/tests/test_pii_hmac_unified\.py|scrapers/tests/test_person_hashing\.py|scrapers/tests/test_sanitizer\.py|scrapers/tests/test_minor_protection\.py|scrapers/tests/test_entity_models\.py|scrapers/tests/test_quality\.py|scrapers/tests/test_run_pipeline\.py|scrapers/pipelines/run_pipeline\.py|scrapers/dedup/specs\.py|scrapers/exporters/staging_exporter\.py|scrapers/tests/test_specs\.py|scrapers/tests/test_staging_exporter\.py|scrapers/parsers/encuentralos_parser\.py|scrapers/parsers/base\.py|scrapers/tests/test_encuentralos_parser\.py|scrapers/tests/fixtures/encuentralos_api_sample\.json|\.github/workflows/ci\.yml|\.github/workflows/build_public_index\.yml|\.github/workflows/ingest\.yml|\.github/workflows/consolidate\.yml)$'
          PATTERN='cedula|telefono|password|secret|api_key|token'

          FOUND=0
          for f in $(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.py' '*.js' '*.ts' '*.json' '*.yaml' '*.yml' '*.sql'); do
            if echo "$f" | grep -qE "$ALLOWLIST"; then
              continue
            fi
            ADDED_LINES=$(git diff "origin/${{ github.base_ref }}...HEAD" -- "$f" \
              | grep -E '^\+' | grep -vE '^\+\+\+' \
              | iconv -f UTF-8 -t ASCII//TRANSLIT 2>/dev/null || true)
            KEYWORDS=$(printf '%s\n' "$ADDED_LINES" | grep -ioE "$PATTERN" | sort -u | paste -sd ',' -) || true
            if [ -n "$KEYWORDS" ]; then
              echo "::error file=$f::Posible dato sensible o secreto detectado en lineas nuevas (palabras clave: $KEYWORDS). El valor no se imprime en el log; revisa el archivo manualmente."
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "Revisa CONTRIBUTING.MD (Reglas de seguridad obligatorias) antes de hacer commit."
            exit 1
          fi

  # Job separado para que pull-requests: write no contamine el job ci
  # (gitleaks, bandit, pip-audit no necesitan ese permiso).
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
