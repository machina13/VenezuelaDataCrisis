name: Ingest

on:
  schedule:
    - cron: "*/10 * * * *"      # cada 10 minutos
  workflow_dispatch:
    inputs:
      config:
        description: "YAML config path"
        default: "scrapers/config/sources.venezuela.starter.yaml"

concurrency:
  group: ingest
  cancel-in-progress: false       # no cancelar runs en curso

permissions:
  contents: read

jobs:
  # ── Discover: qué fuentes necesitan ejecutarse ──────────────────
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      has_sources: ${{ steps.list.outputs.has_sources }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: List enabled sources
        id: list
        env:
          CONFIG: ${{ inputs.config || 'scrapers/config/sources.venezuela.starter.yaml' }}
        run: |
          python -m pip install pyyaml --quiet
          python - <<'EOF'
          import json, os, re, sys
          from pathlib import Path

          import yaml

          SOURCE_ID_PATTERN = re.compile(r"^[a-zA-Z0-9_-]+$")

          def fail(message):
              print(f"ERROR: {message}", file=sys.stderr)
              raise SystemExit(1)

          config_path = Path(os.environ["CONFIG"])
          try:
              cfg = yaml.safe_load(config_path.read_text(encoding="utf-8"))
          except Exception as exc:
              fail(f"no se pudo leer YAML {config_path}: {exc}")

          if not isinstance(cfg, dict):
              fail("el YAML debe ser un objeto top-level")
          sources = cfg.get("sources")
          if not isinstance(sources, list):
              fail("el YAML debe tener una lista top-level 'sources'")

          ids = []
          seen = set()
          for idx, source in enumerate(sources):
              if not isinstance(source, dict):
                  fail(f"source #{idx} debe ser un objeto")
              enabled = source.get("enabled", False)
              if not isinstance(enabled, bool):
                  fail(f"source #{idx} debe tener 'enabled' como booleano")
              if not enabled:
                  continue
              source_id = source.get("id")
              if not isinstance(source_id, str) or not source_id.strip():
                  fail(f"source #{idx} enabled debe tener 'id' como texto no vacio")
              if not SOURCE_ID_PATTERN.fullmatch(source_id):
                  fail(
                      f"source #{idx} id invalido {source_id!r}; "
                      "solo se permiten letras, numeros, '-' y '_'"
                  )
              if source_id in seen:
                  fail(f"source id duplicado en fuentes enabled: {source_id!r}")
              seen.add(source_id)
              ids.append(source_id)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f'matrix={json.dumps({"source_id": ids}, separators=(",", ":"))}\n')
              out.write(f'has_sources={"true" if ids else "false"}\n')
          EOF
        shell: bash

  # ── Ingest: un job por fuente (matrix) ──────────────────────────
  ingest:
    needs: discover
    if: needs.discover.outputs.has_sources == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false            # una fuente fallida no cancela las demás
      max-parallel: 4
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    concurrency:
      group: ingest-${{ matrix.source_id }}
      cancel-in-progress: false   # no superponer la misma fuente
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Resolve spaCy cache path
        id: spacy-cache-path
        run: |
          SITE_PACKAGES=$(python - <<'EOF'
          import sysconfig

          print(sysconfig.get_paths()["purelib"])
          EOF
          )
          echo "site_packages=$SITE_PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.spacy-cache-path.outputs.site_packages }}/es_core_news_sm
            ${{ steps.spacy-cache-path.outputs.site_packages }}/es_core_news_sm-3.8.0.dist-info
          key: spacy-model-es-core-news-sm-3.8.0

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Ingest source ${{ matrix.source_id }}
        env:
          PII_SALT: ${{ secrets.PII_HMAC_SECRET }}
          PII_HMAC_SECRET: ${{ secrets.PII_HMAC_SECRET }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
          PYTHONUNBUFFERED: "1"
          # Las expresiones ${{ }} se inyectan en variables de entorno (NO en el
          # cuerpo del script) para evitar shell injection: un valor malicioso en
          # inputs.config o en matrix.source_id se trataría como dato, no como código.
          CONFIG: ${{ inputs.config || 'scrapers/config/sources.venezuela.starter.yaml' }}
          SOURCE_ID: ${{ matrix.source_id }}
        run: |
          python -m scrapers.cli --verbose ingest \
            --config "$CONFIG" \
            --source "$SOURCE_ID" \
            --output-dir scrapers/runtime_output

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ingest-${{ matrix.source_id }}
          path: scrapers/runtime_output/
          retention-days: 7
          if-no-files-found: ignore
