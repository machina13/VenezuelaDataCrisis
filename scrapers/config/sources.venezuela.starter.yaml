project:
  event_id: 8f14e45f-ceea-467e-bd5d-0a4f2e0c1a3a
  default_country: Venezuela

# Starter config.
# Recomendación: revisar legalidad, robots.txt, tasa de consulta y autorización antes de activar nuevas fuentes.
sources:
  - id: usgs_geojson_venezuela_region
    name: USGS GeoJSON región Venezuela
    type: api_json
    enabled: false
    trust_tier: A
    url: "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2026-06-24&minmagnitude=4&latitude=10.5&longitude=-66.9&maxradiuskm=800"
    refresh_minutes: 30
    parser_asignado: geojson_earthquake
    required_keywords:
      - Venezuela
      - earthquake
    notes: "Disabled until the geojson_earthquake parser is registered (see _get_parser)."

  - id: reliefweb_reports_venezuela_earthquake
    name: ReliefWeb reports Venezuela earthquake
    type: api_json
    enabled: false
    trust_tier: A
    url: "https://api.reliefweb.int/v2/reports?appname=REQUEST_APPROVED_APPNAME&query[value]=Venezuela%20earthquake&limit=10&preset=latest"
    refresh_minutes: 30
    parser_asignado: reliefweb_reports
    required_keywords:
      - Venezuela
      - earthquake
    notes: "Disabled until the project has an approved ReliefWeb v2 appname."

  - id: gdacs_rss
    name: GDACS RSS global
    type: rss
    enabled: false
    trust_tier: A
    url: "https://www.gdacs.org/xml/rss.xml"
    refresh_minutes: 30
    parser_asignado: rss
    required_keywords:
      - Venezuela
      - earthquake

  - id: copernicus_activation_page
    name: Copernicus EMS activation page
    type: html_static
    enabled: false
    trust_tier: A
    url: "https://mapping.emergency.copernicus.eu/activations/EMSR884/"
    refresh_minutes: 60
    parser_asignado: html
    required_keywords:
      - Venezuela
      - earthquake
      - activation
  - id: encuentralos_tecnosoft
    name: Encuentralos - personas desaparecidas
    type: api_json
    enabled: true
    trust_tier: C
    url: "https://encuentralos.tecnosoft.dev/api/personas"
    refresh_minutes: 30
    parser_asignado: encuentralos
    required_keywords: []
    notes: "API paginada (limit/offset, ~108k registros). probe_limit=1000 detecta el máximo que soporta el API antes de paginar."
    probe_limit: 1000
    max_concurrent_pages: 32
    max_concurrent_posts: 8
    bulk_size: 500

  - id: x_venezuela_crisis_recent
    name: "X/Twitter Venezuela Crisis Recent Search"
    type: x_recent_search
    enabled: false
    trust_tier: D
    url: "https://api.x.com/2/tweets/search/recent"
    refresh_minutes: 10
    parser_asignado: x_posts
    required_keywords:
      - desaparecido
      - desaparecida
      - se busca
      - terremoto
      - herido
      - encontrado
    notes: "Fuente social no verificada. Solo posts publicos. Requiere credencial de X via variable documentada. No commitear dumps reales."
