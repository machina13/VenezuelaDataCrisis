# Template for custom scraper source configs.
#
# Valid source types:
#   html_static  - Static HTML page fetched with a simple HTTP client.
#   webapp_js    - Dynamic JavaScript page rendered with Playwright.
#   api_json     - JSON API endpoint.
#   rss          - RSS/Atom feed.
#   pdf          - Remote or local PDF file.
#   manual_file  - Local file outside git, such as a txt/csv dump.
#
# Trust tiers:
#   A - Official institution, verified public agency, or primary trusted source.
#   B - Known NGO, hospital, university, or established organization.
#   C - Volunteer/community project with visible ownership.
#   D - Unverified crowd/public source; requires manual review.
#
# DB/API schema note:
#   The final database spec represents source trust as numeric tiers
#   (person_sources.trust_tier SMALLINT). Scraper configs keep A/B/C/D for
#   readability; the canonical A/B/C/D -> 1/2/3 mapping is documented in
#   docs/pipeline.md (section "Conversión de trust_tier").
#
# Required per source:
#   id, name, type, enabled, trust_tier, url, refresh_minutes, parser_asignado
#
# project.event_id must be a valid UUID — it is injected into every Person
# exported by the pipeline (persons.event_id is NOT NULL in the DB schema).

project:
  event_id: 8f14e45f-ceea-467e-bd5d-0a4f2e0c1a3a
  default_country: Venezuela

sources:
  - id: ejemplo_pagina_html
    name: Pagina HTML de ejemplo
    type: html_static
    enabled: false
    trust_tier: C
    url: "https://example.org/reemplazar"
    refresh_minutes: 30
    parser_asignado: html
    required_keywords:
      - terremoto
      - Venezuela
    notes: "Reemplazar por una fuente real antes de activar."

  - id: ejemplo_api_json
    name: API JSON de ejemplo
    type: api_json
    enabled: false
    trust_tier: B
    url: "https://example.org/api/reemplazar"
    refresh_minutes: 30
    parser_asignado: json_generic
    required_keywords:
      - emergencia
    notes: "Confirmar rate limits y permisos antes de activar."

  - id: ejemplo_webapp
    name: WebApp dinamica de ejemplo
    type: webapp_js
    enabled: false
    trust_tier: C
    url: "https://example.org/app/reemplazar"
    refresh_minutes: 60
    parser_asignado: html
    required_keywords:
      - ayuda
    timeout_seconds: 30
    max_retries: 3
    notes: "Usa Playwright porque el contenido depende de JavaScript."

  - id: ejemplo_pdf
    name: PDF de ejemplo
    type: pdf
    enabled: false
    trust_tier: B
    url: "https://example.org/reporte.pdf"
    refresh_minutes: 120
    parser_asignado: pdf_text
    required_keywords:
      - Venezuela
    notes: "No commitear PDFs reales al repo."

  - id: ejemplo_archivo_manual
    name: Archivo manual local
    type: manual_file
    enabled: false
    trust_tier: D
    url: "/ruta/externa/no-commit/dump.txt"
    refresh_minutes: 60
    parser_asignado: text
    required_keywords:
      - ayuda
    notes: "La ruta debe apuntar a un archivo local ignorado por git."
